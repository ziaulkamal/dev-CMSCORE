# compose.prod.local.yaml — OVERRIDE untuk uji stack PRODUKSI di Podman lokal.
# BUKAN untuk server. Dipakai bersama compose.prod.yaml:
#   podman build -f Dockerfile.prod -t cms-core:latest .
#   podman compose -p cmscore-prod -f compose.prod.yaml -f compose.prod.local.yaml --env-file .env.prod up -d
#
# Perbedaan dari server:
#  - nginx listen 8080 (bukan 80) & mount nginx.local.conf → rootless Podman tak
#    boleh bind port <1024 di dalam container.
#  - dipublish ke host 8090 → http://localhost:8090 (API /v1, docs /docs, media /media/).
services:
  nginx:
    ports:
      - "127.0.0.1:8090:8080"
    volumes:
      - ./docker/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
