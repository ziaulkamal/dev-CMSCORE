# compose.yaml — stack development CMS Core untuk Podman (Windows).
# Jalankan: podman compose up --build
# App hot-reload (volume mount) + Postgres + Redis + MinIO.

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: cms-core-dev
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    ports:
      - "3000:3000"
    volumes:
      # Mount source untuk hot-reload; node_modules tetap milik container.
      - ./src:/app/src:z
      - ./prisma:/app/prisma:z
      - ./package.json:/app/package.json:z
      - ./tsconfig.json:/app/tsconfig.json:z
      - ./tsconfig.build.json:/app/tsconfig.build.json:z
      - ./nest-cli.json:/app/nest-cli.json:z
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: cms_secret
      POSTGRES_DB: cmscore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms -d cmscore"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: docker.io/library/redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: docker.io/minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: cms_minio
      MINIO_ROOT_PASSWORD: cms_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Inisialisasi bucket MinIO sekali jalan, lalu keluar.
  minio-init:
    image: docker.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 cms_minio cms_minio_secret &&
      mc mb --ignore-existing local/cms-media &&
      mc anonymous set download local/cms-media &&
      echo 'bucket cms-media siap';
      "
    restart: "no"

volumes:
  pgdata:
  redisdata:
  miniodata:
