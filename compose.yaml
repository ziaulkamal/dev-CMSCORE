# compose.yaml — stack development CMS Core untuk Podman (Windows).
# Jalankan: podman compose up --build
# App hot-reload (volume mount) + Postgres + Redis + MinIO.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: cms-core-dev
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    ports:
      # Host 40200 → container 3000 (API NestJS). Bind 127.0.0.1: hanya dari mesin
      # ini (browser lokal). Ubah ke "40200:3000" bila perlu akses dari LAN.
      - "127.0.0.1:40200:3000"
    volumes:
      # Mount source untuk hot-reload; node_modules tetap milik container.
      - ./src:/app/src:z
      - ./prisma:/app/prisma:z
      - ./package.json:/app/package.json:z
      - ./tsconfig.json:/app/tsconfig.json:z
      - ./tsconfig.build.json:/app/tsconfig.build.json:z
      - ./nest-cli.json:/app/nest-cli.json:z
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: cms_secret
      POSTGRES_DB: cmscore
    ports:
      # Host 40202 → container 5432. Bind 127.0.0.1 saja: aplikasi memakai jaringan
      # internal (postgres:5432); expose ini HANYA untuk tool desktop (DBeaver/pgAdmin)
      # dari mesin ini. TIDAK terjangkau jaringan luar.
      - "127.0.0.1:40202:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms -d cmscore"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: docker.io/library/redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # Host 40203 → container 6379. Bind 127.0.0.1 saja: aplikasi memakai jaringan
      # internal (redis:6379); expose ini HANYA untuk RedisInsight dari mesin ini.
      # Redis tanpa password → JANGAN ekspos ke jaringan luar.
      - "127.0.0.1:40203:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: docker.io/minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: cms_minio
      MINIO_ROOT_PASSWORD: cms_minio_secret
    ports:
      # Host 40204 → container 9000 (MinIO S3 API). Diakses browser via
      # MINIO_PUBLIC_URL untuk load media. Bind 127.0.0.1 (browser lokal).
      - "127.0.0.1:40204:9000"
      # Host 40205 → container 9001 (MinIO Console web). Dashboard admin manual;
      # tidak dipakai aplikasi. Bind 127.0.0.1 saja.
      - "127.0.0.1:40205:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Inisialisasi bucket MinIO sekali jalan, lalu keluar.
  minio-init:
    image: docker.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 cms_minio cms_minio_secret &&
      mc mb --ignore-existing local/cms-media &&
      mc anonymous set download local/cms-media &&
      echo 'bucket cms-media siap';
      "
    restart: "no"

volumes:
  pgdata:
  redisdata:
  miniodata:
