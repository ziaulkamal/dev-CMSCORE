# nginx.prod.conf — reverse proxy CMS Core (produksi).
# Semua request publik masuk ke sini, lalu diteruskan ke container internal.

server {
    listen 80;
    server_name _;                 # terima semua host (akses via IP). Ganti ke domain bila ada.

    # Batas upload media (sesuaikan bila perlu file lebih besar).
    client_max_body_size 50m;

    # ── API + docs → container app:3000 ──────────────────────────────
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Media publik → container minio:9000 ──────────────────────────
    # Agar MINIO_PUBLIC_URL bisa memakai domain/IP yang sama (path /media/).
    # Set di .env.prod: MINIO_PUBLIC_URL=http://IP-SERVER/media/<bucket>
    location /media/ {
        proxy_pass http://minio:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
