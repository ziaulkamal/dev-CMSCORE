# compose.prod.yaml — stack PRODUKSI CMS Core untuk Docker di server.
# Jalankan: docker compose -f compose.prod.yaml --env-file .env.prod up -d --build
#
# Yang menghadap PUBLIK hanya Nginx (port 80). Postgres/Redis/MinIO TIDAK
# di-publish ke host — hanya diakses antar-container lewat jaringan internal.
# Ganti SEMUA nilai rahasia di .env.prod (lihat .env.prod.example).

services:
  # ── Reverse proxy: satu-satunya pintu publik ──────────────────────
  nginx:
    image: nginx:alpine
    depends_on:
      - app
    ports:
      - "80:80"            # akses via http://IP-SERVER (API di /v1, docs di /docs)
    volumes:
      - ./docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # ── Aplikasi (tidak di-publish; Nginx yang meneruskan) ────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: cms-core
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Redis produksi WAJIB pakai password (di-set dari .env.prod).
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Buat bucket sekali jalan lalu keluar.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
      mc mb --ignore-existing local/${MINIO_BUCKET} &&
      mc anonymous set download local/${MINIO_BUCKET} &&
      echo 'bucket ${MINIO_BUCKET} siap';
      "
    restart: "no"

volumes:
  pgdata:
  redisdata:
  miniodata:
